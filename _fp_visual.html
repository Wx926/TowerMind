<!DOCTYPE html>
<html><body style="margin:0">
<iframe id="f" src="index.html" style="width:1300px;height:1300px;border:0"></iframe>
<script>
const f = document.getElementById('f');
f.onload = () => {
  const d = f.contentDocument;
  const w = f.contentWindow;
  setTimeout(() => {
    const cards = d.querySelectorAll('.fp-floor-card');
    cards[6].click(); // floor 7
    const expandEl = d.getElementById('fpExpand');
    expandEl.style.transition = 'none';
    d.documentElement.style.scrollBehavior = 'auto';
    const rect = d.getElementById('fpFloorGrid').getBoundingClientRect();
    w.scrollTo(0, rect.top + w.scrollY - 90);
  }, 400);
};
</script>
</body></html>
