<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TowerMind - Smart Resource Management</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/charts.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">&#127979;</span>
      <div>
        <div class="brand-name">TowerMind</div>
        <div class="brand-tagline">Smart Resource Management</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <a href="#dashboard" data-page="dashboard" class="nav-item">
        <span class="nav-icon">&#128202;</span> Dashboard
      </a>
      <a href="#kpi" data-page="kpi" class="nav-item">
        <span class="nav-icon">&#127919;</span> KPI Executive
      </a>
      <a href="#forecast" data-page="forecast" class="nav-item">
        <span class="nav-icon">&#128302;</span> Forecast
      </a>
      <a href="#anomalies" data-page="anomalies" class="nav-item">
        <span class="nav-icon">&#9888;</span> Anomalies
      </a>
      <a href="#recommendations" data-page="recommendations" class="nav-item">
        <span class="nav-icon">&#128161;</span> Recommendations
      </a>
      <a href="#scheduler" data-page="scheduler" class="nav-item">
        <span class="nav-icon">&#128197;</span> Scheduler
      </a>
      <a href="#simulator" data-page="simulator" class="nav-item">
        <span class="nav-icon">&#10024;</span> AI Simulator
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-footer-label">Every kilowatt, every drop of water,</div>
      <div class="sidebar-footer-label">used where it matters most.</div>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">&#9776;</button>
      <h1 class="page-title" id="page-title">Dashboard</h1>
      <div class="topbar-right">
        <span class="topbar-status" id="api-status">&#9679; Connecting...</span>
      </div>
    </header>
    <main class="page-content" id="page-content">
      <div class="loading-state">Loading TowerMind...</div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/charts.js"></script>
<script src="js/components/kpi_card.js"></script>
<script src="js/components/anomaly_card.js"></script>
<script src="js/components/recommendation_card.js"></script>
<script src="js/components/scenario_card.js"></script>
<script src="js/components/navigation.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/kpi.js"></script>
<script src="js/pages/forecast.js"></script>
<script src="js/pages/anomalies.js"></script>
<script src="js/pages/recommendations.js"></script>
<script src="js/pages/scheduler.js"></script>
<script src="js/pages/simulator.js"></script>
<script src="js/app.js"></script>
</body>
</html>
