<!DOCTYPE html>
<html>
<body>
<iframe id="f" src="index.html" style="width:1200px;height:900px"></iframe>
<script>
const f = document.getElementById('f');
f.onload = () => {
  const d = f.contentDocument;
  const w = f.contentWindow;
  setTimeout(() => {
    d.documentElement.style.scrollBehavior = 'auto';
    function activeLink() {
      const a = d.querySelector('.nav-links a.active');
      return a ? a.getAttribute('href') : null;
    }
    const result = { atTop: activeLink() };

    w.scrollTo(0, d.getElementById('forecast').offsetTop + 50);
    w.dispatchEvent(new Event('scroll'));
    result.atForecast = activeLink();

    w.scrollTo(0, d.getElementById('floorplan').offsetTop + 50);
    w.dispatchEvent(new Event('scroll'));
    result.atFloorplan = activeLink();

    w.scrollTo(0, d.getElementById('simulator').offsetTop + 50);
    w.dispatchEvent(new Event('scroll'));
    result.atSimulator = activeLink();

    w.scrollTo(0, d.getElementById('dashboard').offsetTop + 50);
    w.dispatchEvent(new Event('scroll'));
    result.atDashboard = activeLink();

    document.title = 'RESULT:' + JSON.stringify(result);
  }, 400);
};
</script>
</body>
</html>
